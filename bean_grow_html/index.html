<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>강낭콩 키우기 - 홈</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="강낭콩 키우기">
      <section class="screen screen-home active">
        <div class="sky">
          <div class="weather">
            <strong>맑음 24°C</strong>
            <span>6월 3일 수요일</span>
            <span>오후 4:20</span>
          </div>
          <button class="gear" data-nav="settings" aria-label="설정으로 이동">⚙</button>
          <div class="garden" id="gardenDrop">
            <img
              src="./assets/bean-stage1.gif"
              alt="강낭콩 캐릭터"
              class="hero-bean"
              id="stageBean"
              data-stage="1"
              role="button"
              tabindex="0"
            />
            <div class="water-effect" aria-hidden="true">💧</div>
          </div>
          <button class="water-can" id="waterCan" aria-label="미션 화면으로 이동">🎯</button>
        </div>

        <div class="content home-content">
          <section class="level-panel">
            <div>
              <p class="level" id="levelText">Lv. 1</p>
              <div class="bar"><span id="homeExp" style="width: 0%"></span></div>
            </div>
            <div class="exp">
              <strong id="expText">0 / 100 EXP</strong>
              <span id="waterHint">오늘의 미션을 체크하면 콩이 성장합니다</span>
            </div>
            <div class="reward-icon" id="clearCountBadge">0</div>
          </section>

          <section class="mission-panel">
            <header>
              <h2>오늘의 자가체크</h2>
              <span id="homeProgressText">0 / 10 완료</span>
            </header>
            <div class="home-check-summary">
              <div>
                <strong id="homeClearBig">0</strong>
                <span>완료한 미션</span>
              </div>
              <div>
                <strong id="homeRemainBig">10</strong>
                <span>남은 체크</span>
              </div>
              <a href="./missions.html">전체 보기</a>
            </div>
            <div id="homeMissionList" class="home-mission-list"></div>
          </section>
        </div>
      </section>

      <nav class="bottom-nav" aria-label="하단 메뉴">
        <a class="active" href="./index.html"><span>🌱</span>홈</a>
        <a href="./missions.html"><span>🎯</span>미션</a>
        <a href="./records.html"><span>📅</span>기록</a>
        <a href="./collection.html"><span>📚</span>컬렉션</a>
      </nav>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
