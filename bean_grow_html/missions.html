<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>강낭콩 키우기 - 미션</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="자가체크 미션">
      <section class="screen screen-missions active">
        <header class="page-head">
          <button class="back" data-nav="home" aria-label="홈으로 이동">‹</button>
          <div>
            <h1>자가체크 미션</h1>
            <p>오늘 실천한 환경 행동을 체크하고 강낭콩을 키워보세요.</p>
          </div>
          <img src="./assets/bean-stage1.gif" alt="" />
        </header>
        <div class="content">
          <section class="weekly-progress">
            <div class="row-between">
              <strong>오늘 진행률</strong>
              <b id="missionProgressText">0 / 10 완료</b>
            </div>
            <div class="bar"><span id="missionProgressBar" style="width: 0%"></span></div>
            <div class="milestones">
              <span id="milestone1">🌱<em>첫 클리어</em></span>
              <span id="milestone5">🌿<em>5개 완료</em></span>
              <span id="milestone10">🏆<em>10개 완료</em></span>
            </div>
          </section>

          <div class="section-title">
            <h2>미션 10개</h2>
            <span>사진 업로드 없이 자가체크만 사용</span>
          </div>
          <div class="mission-list" id="missionCheckList"></div>

          <section class="bonus">
            <img src="./assets/bean-stage1.gif" alt="" />
            <p>1번째, 5번째, 10번째 완료마다 성장 이벤트가 열립니다.</p>
            <button class="ghost reset-progress" id="resetProgress" type="button">초기화</button>
          </section>
        </div>
      </section>

      <nav class="bottom-nav" aria-label="하단 메뉴">
        <a href="./index.html"><span>🌱</span>홈</a>
        <a class="active" href="./missions.html"><span>🎯</span>미션</a>
        <a href="./records.html"><span>📅</span>기록</a>
        <a href="./collection.html"><span>📚</span>컬렉션</a>
      </nav>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
